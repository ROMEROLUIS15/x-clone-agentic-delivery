services:
  postgres:
    image: postgres:16-alpine
    container_name: xclone-db
    environment:
      POSTGRES_USER: xclone
      POSTGRES_PASSWORD: xclone
      POSTGRES_DB: xclone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xclone"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xclone-backend
    environment:
      DATABASE_URL: "postgresql://xclone:xclone@postgres:5432/xclone"
      PORT: "4000"
      JWT_SECRET: "change-me-in-production"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xclone-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
